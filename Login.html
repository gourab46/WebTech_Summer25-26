<!DOCTYPE html>
<html lang="en-US">

<head>
    <title> Login </title>

    <link rel="stylesheet" href="../Design/design.css">

</head>

<body>

    <div class="position">
        <div class="header">
            <h2> AIUB Student Portal Login </h2>
        </div>
    </div>

    <div class="topnav">
        <a href="https://aiub.edu/"> AIUB WebSite </a>
        <a href="https://portal.aiub.edu"> AIUB Portal </a>
    </div>

    <div class="container">

        <h1> User Login Form </h1>

        <form onsubmit="return collect_data()">

            <fieldset>

                <legend> Login Information </legend>

                <table>

                    <tr>

                        <td>
                            <label for="user"> Username: </label>
                        </td>

                        <td>
                            <input type="text" id="name" name="name">
                        </td>

                        <td>
                            <p id="NameError"></p>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <label for="Password"> Password: </label>
                        </td>

                        <td>
                            <input type="password" id="pass" name="pass">
                        </td>

                        <td>
                            <p id="PassError"></p>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <input type="submit" id="submit" name="submit" value="Login">
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <p id="LoginMessage"></p>
                        </td>

                    </tr>

                </table>

            </fieldset>

        </form>

    </div>

    <script src="../JavaScript/Script.js"></script>

</body>

</html>
